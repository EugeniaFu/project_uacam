<!doctype html>
<html lang="es">
<head>
  <!-- Meta tags para prevenir caché del navegador -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- VALIDACIÓN CRÍTICA: Verificar sesión ANTES de renderizar HTML -->
  <script>
  if (!localStorage.getItem('token')) {
    window.location.replace('index.html');
  }
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Usuarios</title>
  <link rel="icon" type="image/png" href="assets/logo2.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="css/exact-style.css" rel="stylesheet">
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    .password-wrapper {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      color: #6c757d;
      font-size: 18px;
    }
    .password-toggle:hover {
      color: #495057;
    }
  </style>
</head>
<body x-data="usersPage()" x-init="validateSessionWithServer(); load()">
  <!-- Sistema de Notificaciones/Toasts -->
  <div style="position: fixed; top: 20px; right: 20px; z-index: 9999; max-width: 400px;">
    <template x-for="(toast, idx) in notifications" :key="idx">
      <div class="alert" :class="'alert-' + toast.type" style="margin-bottom: 10px; animation: slideInRight 0.3s ease;" role="alert">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <strong x-show="toast.title" x-text="toast.title"></strong>
            <p class="mb-0" x-text="toast.message"></p>
          </div>
          <button type="button" class="btn-close" @click="notifications.splice(idx, 1)"></button>
        </div>
      </div>
    </template>
  </div>

  <!-- Cargar header externo -->
  <div x-data="{ header: '' }" x-init="fetch('./Template/header.html').then(r => r.text()).then(html => { header = html })">
    <div x-html="header"></div>
  </div>

  <div class="container-fluid">
    <div class="row">
      <div class="col-2">
        <div x-data="{ sidebar: '' }" x-init="fetch('./Template/sidebar.html').then(r => r.text()).then(html => { sidebar = html })">
          <div x-html="sidebar"></div>
        </div>
      </div>
      <div class="col-9">
        <div class="card-panel">
          <div class="d-flex justify-content-between">
            <h3>Usuarios</h3>
            <button class="btn btn-primary" @click="openNew()">Agregar usuario</button>
          </div>

          <table class="table table-soft mt-3">
            <thead>
              <tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th>Acción</th></tr>
            </thead>
            <tbody>
              <template x-for="u in users" :key="u.id">
                <tr>
                  <td x-text="u.id"></td>
                  <td x-text="u.name"></td>
                  <td x-text="u.email"></td>
                  <td x-text="u.role"></td>
                  <td x-text="u.active? 'Sí':'No'"></td>
                  <td>
                    <button class="btn btn-sm btn-secondary" @click="edit(u)">Editar</button>
                    <button class="btn btn-sm btn-danger" @click="toggle(u)"><span x-text="u.active? 'Dar baja':'Activar'"></span></button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <!-- Modal sencillo para crear/editar usuario -->
  <div x-show="modal" x-cloak style="position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1050;padding:16px;animation:fadeIn 0.3s ease;" @click.outside="modal=false">
    <div class="card p-3 animate__animated animate__zoomIn" style="width:520px;max-width:600px;margin:auto;max-height:90vh;overflow-y:auto" @click.outside="modal=false">
      <h5 x-text="form.id ? 'Editar usuario' : 'Nuevo usuario'"></h5>

      <div class="mb-2">
        <label class="form-label">Nombre</label>
        <input class="form-control" type="text" x-model="form.name" placeholder="Nombre completo">
      </div>

      <div class="mb-2">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" x-model="form.email" placeholder="correo@ejemplo.com">
      </div>

      <div class="mb-2">
        <label class="form-label">Rol</label>
        <select class="form-select" x-model="form.role">
          <option value="encargado">Encargado</option>
          <option value="coordinador">Coordinador</option>
        </select>
      </div>

      <div class="mb-2">
        <label class="form-label">Contraseña</label>
        <div class="password-wrapper">
          <input class="form-control" :type="showPassword ? 'text' : 'password'" x-model="form.password" :required="!form.id" :placeholder="form.id ? 'Dejar vacío para no cambiar' : ''" style="padding-right: 40px;">
          <button type="button" class="password-toggle" @click="showPassword = !showPassword">
            <i class="bi" :class="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="form-text" x-show="!form.id">La contraseña es obligatoria al agregar usuario.</div>
      </div>



      <div class="text-end">
        <button class="btn btn-secondary me-2" @click="modal=false">Cancelar</button>
        <button class="btn btn-primary" @click="save()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/secure-session.js"></script>
  <script>
  function usersPage(){
    return {
      role: (localStorage.getItem('role') || 'encargado'),
      userName: (localStorage.getItem('userName') || ''),
      users: [], modal:false, form: {}, showPassword: false, notifications: [],
      showNotification(message, type = 'info', title = '') {
        this.notifications.push({ message, type, title });
        setTimeout(() => this.notifications.shift(), 4000);
      },
      async load(){
        try {
          const r = await apiFetch('/users','GET'); 
          if(r.ok) this.users = r.data;
          try{
            const s = await apiFetch('/dashboard/summary','GET');
            if(s.ok){
              this.role = s.data.role || this.role;
              this.userName = s.data.user?.name || this.userName;
              if(this.userName) localStorage.setItem('userName', this.userName);
              if(this.role) localStorage.setItem('role', this.role);
            }
          }catch(e){}
        } catch(e) {
          this.showNotification('Error al cargar usuarios: ' + e.message, 'danger', 'Error');
        }
      },
      logout(){
        // Llamar a la función mejorada de logout que invalida la sesión en el servidor
        window.logout();
      },
      openNew(){ 
        this.form = { role: 'encargado', active: true }; 
        this.showPassword = false; 
        this.modal = true; 
      },
      edit(u){ 
        this.form = Object.assign({}, u); 
        this.form.active = !!this.form.active; 
        this.showPassword = false; 
        this.modal = true; 
      },
      async save(){
        if(!this.form.id){
          const pwd = (this.form.password || '').trim();
          if(!pwd){
            this.showNotification('La contraseña es obligatoria al crear un usuario', 'warning', 'Validación');
            return;
          }
        }
        if(!this.form.name || !this.form.email) {
          this.showNotification('Por favor completa todos los campos requeridos', 'warning', 'Validación');
          return;
        }
        try {
          const payload = {
            name: this.form.name,
            email: this.form.email,
            role: this.form.role
          };
          if(this.form.password && this.form.password.trim()){
            payload.password = this.form.password;
          }
          if(!this.form.id){
            payload.active = this.form.active;
          }
          let r;
          if(this.form.id){
            r = await apiFetch('/users/'+this.form.id,'PUT',payload);
          } else {
            r = await apiFetch('/users','POST',payload);
          }
          if(r.ok){
            const msg = this.form.id ? 'Usuario actualizado' : 'Usuario creado exitosamente';
            this.showNotification(msg, 'success', '✓ Éxito');
            this.modal=false; 
            this.load();
          } else {
            const msg = (r.data && (r.data.message || JSON.stringify(r.data.errors||r.data))) || 'Error al guardar';
            this.showNotification(msg, 'danger', 'Error');
          }
        } catch(e) {
          this.showNotification('Error: ' + e.message, 'danger', 'Error');
        }
      },
      async toggle(u){ 
        try {
          const r = await apiFetch('/users/'+u.id+'/toggle','POST');
          if(r.ok) {
            const msg = u.active ? 'Usuario desactivado' : 'Usuario activado';
            this.showNotification(msg, 'success', '✓ Éxito');
            this.load();
          } else {
            this.showNotification(r.data?.message || 'Error al cambiar estado', 'danger', 'Error');
          }
        } catch(e) {
          this.showNotification('Error: ' + e.message, 'danger', 'Error');
        }
      }
    };
  }
  </script>

  <!-- Cargar footer externo -->
  <div x-data="{ footer: '' }" x-init="fetch('./Template/footer.html').then(r => r.text()).then(html => { footer = html })">
    <div x-html="footer"></div>
  </div>

</body>
</html>
