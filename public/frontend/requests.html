<!doctype html>
<html lang="es">
<head>
  <!-- Meta tags para prevenir caché del navegador -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- VALIDACIÓN CRÍTICA: Verificar sesión ANTES de renderizar HTML -->
  <script>
  if (!localStorage.getItem('token')) {
    window.location.replace('index.html');
  }
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Solicitudes</title>
  <link rel="icon" type="image/png" href="assets/logo2.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="css/exact-style.css" rel="stylesheet">
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body x-data="requestsPage()" x-init="validateSessionWithServer(); load()">
  <!-- Sistema de Notificaciones/Toasts -->
  <div style="position: fixed; top: 20px; right: 20px; z-index: 9999; max-width: 400px;">
    <template x-for="(toast, idx) in notifications" :key="idx">
      <div class="alert" :class="'alert-' + toast.type" style="margin-bottom: 10px; animation: slideInRight 0.3s ease;" role="alert">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <strong x-show="toast.title" x-text="toast.title"></strong>
            <p class="mb-0" x-text="toast.message"></p>
          </div>
          <button type="button" class="btn-close" @click="notifications.splice(idx, 1)"></button>
        </div>
      </div>
    </template>
  </div>

  <!-- Cargar header externo -->
  <div x-data="{ header: '' }" x-init="fetch('./Template/header.html').then(r => r.text()).then(html => { header = html })">
    <div x-html="header"></div>
  </div>

  <div class="container-fluid">
    <div class="row">
      <div class="col-2">
        <div x-data="{ sidebar: '' }" x-init="fetch('./Template/sidebar.html').then(r => r.text()).then(html => { sidebar = html })">
          <div x-html="sidebar"></div>
        </div>
      </div>

      <div class="col-9">
        <div class="card-panel animate__animated animate__fadeInUp">
          <h3 class="text-center mb-5">Solicitudes</h3>
          <div class="d-flex justify-content-center align-items-center gap-5">
            <button class="btn btn-prestamo btn-lg d-flex flex-column align-items-center animate__animated animate__bounceIn" style="min-width: 300px; padding: 50px 70px; animation-delay: 0.1s;" @click="window.location.href='requests_pres.html'">
              <i class="bi bi-arrow-repeat" style="font-size: 5rem;"></i>
              <span class="mt-3" style="font-size: 1.8rem;">Préstamo</span>
            </button>
            <button class="btn btn-salida btn-lg d-flex flex-column align-items-center animate__animated animate__bounceIn" style="min-width: 300px; padding: 50px 70px; animation-delay: 0.2s;" @click="window.location.href='requests_sal.html'">
              <i class="bi bi-box-arrow-right" style="font-size: 5rem;"></i>
              <span class="mt-3" style="font-size: 1.8rem;">Salida</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/secure-session.js"></script>
  <script>
  function requestsPage(){
    return {
      role: (localStorage.getItem('role') || 'encargado'),
      userName: (localStorage.getItem('userName') || ''),
      requests: [], products: [], modal: false, form: {items: []}, newItem: {product_id: '', quantity: 1},
      notifications: [],
      showNotification(message, type = 'info', title = '') {
        this.notifications.push({ message, type, title });
        setTimeout(() => this.notifications.shift(), 4000);
      },
      async load(){
        try {
          const r = await apiFetch('/requests','GET'); 
          if(r.ok) this.requests = r.data;
          const p = await apiFetch('/products','GET'); 
          if(p.ok) this.products = p.data;
          try{ 
            const s = await apiFetch('/dashboard/summary','GET'); 
            if(s.ok){ 
              this.role = s.data.role || this.role; 
              this.userName = s.data.user?.name || this.userName; 
              if(this.userName) localStorage.setItem('userName', this.userName); 
              if(this.role) localStorage.setItem('role', this.role); 
            } 
          }catch(e){}
        } catch(e) {
          this.showNotification('Error al cargar datos: ' + e.message, 'danger', 'Error');
        }
      },
      logout(){
        // Llamar a la función mejorada de logout que invalida la sesión en el servidor
        window.logout();
      },
      new(type){ 
        this.form = {type: type, items: [], solicitante: '', return_date: null}; 
        this.modal = true; 
      },
      addItem(){
        const p = this.products.find(x => x.id == this.newItem.product_id); 
        if(!p) {
          this.showNotification('Por favor selecciona un producto válido', 'warning', 'Validación');
          return; 
        }
        this.form.items.push({product_id: p.id, name: p.name, quantity: this.newItem.quantity}); 
        this.newItem = {product_id: '', quantity: 1};
        this.showNotification('Producto agregado', 'success');
      },
      async save(){ 
        if(!this.form.solicitante || this.form.items.length === 0) {
          this.showNotification('Por favor completa todos los campos y agrega al menos un producto', 'warning', 'Validación');
          return;
        }
        try {
          const typeLabel = this.form.type === 'prestamo' ? 'Préstamo' : 'Salida';
          const body = {type: this.form.type, solicitante: this.form.solicitante, items: this.form.items, return_date: this.form.return_date}; 
          const r = await apiFetch('/requests','POST', body);
          if(r.ok) {
            this.showNotification(`Solicitud de ${typeLabel} creada exitosamente`, 'success', '✓ Éxito');
            this.modal = false; 
            this.load();
          } else {
            this.showNotification(r.data?.message || 'Error al crear solicitud', 'danger', 'Error');
          }
        } catch(e) {
          this.showNotification('Error: ' + e.message, 'danger', 'Error');
        }
      },
      view(r){ 
        this.showNotification('ID: ' + r.id + ', Solicitante: ' + r.solicitante, 'info', 'Detalles');
      },
      async del(r){ 
        if(!confirm('¿Estás seguro de que deseas eliminar esta solicitud?')) return; 
        try {
          const res = await apiFetch('/requests/'+r.id,'DELETE');
          if(res.ok) {
            this.showNotification('Solicitud eliminada correctamente', 'success', '✓ Éxito');
            this.load();
          } else {
            this.showNotification(res.data?.message || 'Error al eliminar', 'danger', 'Error');
          }
        } catch(e) {
          this.showNotification('Error: ' + e.message, 'danger', 'Error');
        }
      }
    };
  }
  </script>

  <!-- Cargar footer externo -->
  <div x-data="{ footer: '' }" x-init="fetch('./Template/footer.html').then(r => r.text()).then(html => { footer = html })">
    <div x-html="footer"></div>
  </div>

</body>
</html>
